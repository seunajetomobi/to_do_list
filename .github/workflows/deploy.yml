name: Deploy Pages
on:
  push:
    branches:
      - main
      - copilot/build-todo-application
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_pages:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build for GitHub Pages
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy_pages:
    needs: build_pages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Health check GitHub Pages
        continue-on-error: true
        run: |
          set -euo pipefail
          url="${{ steps.deployment.outputs.page_url }}"
          echo "Checking $url"
          # show diagnostic headers and body on failure to aid debugging
          for i in 1 2 3 4 5 6; do
            if curl -fsSL --max-time 10 "$url" >/dev/null; then
              echo "GitHub Pages is healthy."
              exit 0
            fi
            echo "Attempt $i failed; dumping headers for diagnosis..."
            curl -sSIL --max-time 10 "$url" || true
            echo "Retrying in 10s..."
            sleep 10
          done
          echo "GitHub Pages health check failed (non-fatal due to continue-on-error)."
